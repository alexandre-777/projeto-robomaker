<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua conta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #000;
        }

        header {
            background-color: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #ff0000;
        }

        header h1 {
            margin-bottom: 15px;
            font-size: 28px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #ff0000;
            color: #fff;
        }

        main {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }

        section {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #ff0000;
        }

        form div {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #000;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #000;
            border-radius: 5px;
            font-size: 14px;
            background-color: #fff;
            color: #000;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #ff0000;
            background-color: #fff;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ff0000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #000;
            color: #fff;
        }

        footer {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 4px solid #ff0000;
        }
    </style>
</head>
<body>
    <!--Cabeçalho-->
    <header style="background-color: #000; color: #fff; border-bottom: 4px solid #ff0000;">
        <h1 style="color: #fff;">Crie sua conta</h1>
        <nav>
            <a href="index.html">Voltar para página inicial</a>
        </nav>
    </header>

    <!--Formulário de cadastro-->
    <main>
        <section>
            <form>
                <div>
                    <label for="nome">Nome completo completo</label>
                    <input type="text" name="nome" id="nome" required>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" required>
                </div>

                <div>
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" required>
                </div>

                <div>
                    <label>Perfil de Aluno</label>
                    <label>
                        <input type="radio" name="perfil" value="estudante" required>
                        Estudante
                    </label>
                    <label>
                        <input type="radio" name="perfil" value="professor">
                        Professor/Hobbista
                    </label>
                </div>

                <div>
                    <label for="trilha">Trilha de interesse</label>
                    <select name="trilha" id="trilha" required>
                        <option value="">Selecione uma trilha</option>
                        <option value="basica">Robótica Básica</option>
                        <option value="ia">Inteligencia Artificial</option>
                        <option value="programacao">Programação</option>
                    </select>
                </div>

                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>
    <!--Rodapé-->
    <footer>
        <p>&copy; 2026 RoboMaker kits educacionais</p>
    </footer>
</body>
</html>
